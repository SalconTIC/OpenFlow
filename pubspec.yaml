name: openflow
description: "Proyecto Base para la descarga de Flutter Flow"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations: 
    sdk: flutter
  google_fonts: ^8.0.2 
  font_awesome_flutter: ^11.0.0 
  cached_network_image: ^3.4.0
  #flutterflow_ui: ^0.3.1 # Vamos a intentar librarnos de esto ya
  cupertino_icons: ^1.0.6
  intl: ^0.20.2
  smooth_page_indicator: ^2.0.1
  provider: ^6.1.5+1
  go_router: ^17.2.2
  # Solo si usas mapas o gráficas, descomenta estas:
  # google_maps_flutter: ^2.7.1
  # fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true


dependency_overrides:
  intl: ^0.20.2
